<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WireTrace</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  width: 100%; height: 100%;
  background: #0c0c0f; color: #e0e0e0;
  font-family: 'Courier New', monospace; font-size: 12px;
  display: flex; flex-direction: column;
}
header {
  background: #111215; border-bottom: 2px solid #ff444422;
  padding: 10px 14px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.title { color: #ff4444; font-size: 14px; font-weight: bold; letter-spacing: 2px; }
.subtitle { color: #555; font-size: 10px; margin-top: 2px; }
#count {
  background: #ff444418; border: 1px solid #ff444440;
  color: #ff4444; padding: 3px 12px; border-radius: 99px;
  font-size: 11px; font-weight: bold;
}
.controls {
  padding: 10px 12px; display: flex; gap: 6px;
  border-bottom: 1px solid #1a1a1e; flex-shrink: 0; flex-wrap: wrap;
}
button {
  cursor: pointer; border: none; border-radius: 4px;
  padding: 7px 12px; font-family: 'Courier New', monospace;
  font-size: 11px; font-weight: bold; transition: all 0.15s;
}
#btn-capture { background: #ff4444; color: #fff; flex: 1; }
#btn-capture:hover { background: #ff6060; }
#btn-capture.on { background: #22aa44; animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{background:#22aa44} 50%{background:#33cc55} }

#btn-inject {
  background: #1a2a1a; color: #44cc66;
  border: 1px solid #44cc6633;
}
#btn-inject:hover { background: #223322; }
#btn-inject.ok { background: #223322; color: #44ff88; }

#btn-export {
  background: #0d1e35; color: #4a9eff; border: 1px solid #4a9eff33;
}
#btn-export:hover { background: #112244; }
#btn-clear { background: #1a1a1e; color: #666; border: 1px solid #2a2a2e; }
#btn-clear:hover { background: #222228; color: #bbb; }

.filter-row {
  padding: 8px 12px; display: flex; gap: 6px;
  border-bottom: 1px solid #1a1a1e; flex-shrink: 0;
}
.filter-row input {
  flex: 1; background: #141418; border: 1px solid #252528;
  color: #e0e0e0; padding: 5px 9px; border-radius: 4px;
  font-family: 'Courier New', monospace; font-size: 11px; outline: none;
}
.filter-row input:focus { border-color: #ff444444; }
.filter-row select {
  background: #141418; border: 1px solid #252528; color: #999;
  padding: 5px 8px; border-radius: 4px;
  font-family: 'Courier New', monospace; font-size: 11px; outline: none;
}
.list { flex: 1; overflow-y: auto; min-height: 0; }
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }
.item {
  padding: 8px 12px; border-bottom: 1px solid #131316;
  display: flex; align-items: center; gap: 8px; transition: background 0.1s;
}
.item:hover { background: #111116; }
.method {
  font-size: 10px; font-weight: bold; padding: 2px 6px;
  border-radius: 3px; min-width: 44px; text-align: center;
}
.GET    { background: #0a1828; color: #4a9eff; }
.POST   { background: #0a2010; color: #4caf50; }
.PUT    { background: #201400; color: #ff9800; }
.PATCH  { background: #140a20; color: #ab47bc; }
.DELETE { background: #200a0a; color: #ff4444; }
.status {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  min-width: 34px; text-align: center; font-weight: bold;
}
.s2{color:#4caf50} .s3{color:#ff9800} .s4{color:#ff6666} .s5{color:#e91e63}
.item-url { flex: 1; overflow: hidden; }
.item-path {
  color: #ddd; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; font-size: 11px;
}
.item-host { color: #444; font-size: 10px; }
.item-time { color: #333; font-size: 10px; white-space: nowrap; }
.empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; color: #444;
  text-align: center; padding: 20px;
}
.empty .ico { font-size: 36px; margin-bottom: 12px; }
.empty p { font-size: 11px; line-height: 1.9; }
.empty b { color: #777; }
.empty code {
  background: #1a1a1e; color: #44cc66; padding: 2px 6px;
  border-radius: 3px; font-size: 10px;
}
footer {
  padding: 7px 12px; border-top: 1px solid #1a1a1e;
  display: flex; justify-content: space-between; align-items: center;
  color: #444; font-size: 10px; flex-shrink: 0;
}
.led { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.led.on  { background: #33cc55; box-shadow: 0 0 6px #33cc55; animation: blink-led 1.2s infinite; }
.led.off { background: #333; }
@keyframes blink-led { 0%,100%{opacity:1} 50%{opacity:0.3} }
.toast {
  position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
  background: #22aa44; color: #fff; padding: 6px 16px;
  border-radius: 4px; font-size: 11px; font-weight: bold;
  opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <div>
    <div class="title">⬡ WIRETRACE <span style="font-size:10px;color:#ff444488;letter-spacing:1px">v1.0</span></div>
    <div class="subtitle" id="host-label">aguardando...</div>
  </div>
  <span id="count">0 reqs</span>
</header>

<div class="controls">
  <button id="btn-capture">▶ Iniciar Captura</button>
  <button id="btn-inject">⚡ Injetar na aba</button>
  <button id="btn-export">⬇ Exportar .txt</button>
  <button id="btn-clear">✕ Limpar</button>
</div>

<div class="filter-row">
  <input id="filter" placeholder="Filtrar URL, método, status..." />
  <select id="method-filter">
    <option value="">Todos</option>
    <option value="GET">GET</option>
    <option value="POST">POST</option>
    <option value="PUT">PUT</option>
    <option value="PATCH">PATCH</option>
    <option value="DELETE">DELETE</option>
  </select>
</div>

<div class="list" id="list">
  <div class="empty">
    <div class="ico">📡</div>
    <p>
      1. Clique <b>▶ Iniciar Captura</b><br>
      2. Clique <b>⚡ Injetar na aba</b> na aba do site<br>
      3. Ou recarregue a página <code>F5</code><br>
      4. Interaja com o site normalmente
    </p>
  </div>
</div>

<footer>
  <span><span class="led off" id="led"></span><span id="status-label">Parado</span></span>
  <span id="req-count-label">0 requisições</span>
</footer>
<div style="text-align:center;padding:5px 0 6px;background:#0c0c0f;border-top:1px solid #1a1a1e;font-size:10px;color:#333;flex-shrink:0;">
  by <a href="https://github.com/victorlgim" target="_blank"
    style="color:#ff444466;text-decoration:none;transition:color 0.2s"
    onmouseover="this.style.color='#ff4444'"
    onmouseout="this.style.color='#ff444466'">github.com/victorlgim</a>
</div>

<div class="toast" id="toast"></div>
<script src="panel.js"></script>
</body>
</html>
